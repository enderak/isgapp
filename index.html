        // --- HELPER: SAFE LUCIDE ---
        function safeLucide() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                try {
                    lucide.createIcons();
                } catch (e) {
                    console.warn("Lucide/UI update error:", e);
                }
            }
        }

        const PENDING_LOADS = new Map();
        async function loadQuestionFile(filename) {
            if (LOADED_FILES.has(filename)) return true;
            if (PENDING_LOADS.has(filename)) return PENDING_LOADS.get(filename);
            
            const loadPromise = new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = `sorular/${filename}`;
                script.async = true; 
                script.onload = () => {
                    LOADED_FILES.add(filename);
                    PENDING_LOADS.delete(filename);
                    console.log(`Script Ready: ${filename}`);
                    resolve(true);
                };
                script.onerror = () => {
                    PENDING_LOADS.delete(filename);
                    reject(new Error(`Dosya yüklenemedi: ${filename}`));
                };
                document.body.appendChild(script);
            });
            
            PENDING_LOADS.set(filename, loadPromise);
            return loadPromise;
        }
    </script>

        function getDailyContent() {
            const now = new Date();
            const month = now.getMonth() + 1; // 0-indexed
            const day = now.getDate();

            if (day === 23 && month === 4) return "23 Nisan Ulusal Egemenlik ve Çocuk Bayramı Kutlu Olsun!";
            if (day === 1 && month === 5) return "1 Mayıs Emek ve Dayanışma Günü Kutlu Olsun!";
            if (day === 19 && month === 5) return "19 Mayıs Atatürk'ü Anma, Gençlik ve Spor Bayramı Kutlu Olsun!";
            if (day === 30 && month === 8) return "30 Ağustos Zafer Bayramı Kutlu Olsun!";
            if (day === 29 && month === 10) return "29 Ekim Cumhuriyet Bayramı Kutlu Olsun!";

            // Pick a quote based on the day of the year
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
            return QUOTES[dayOfYear % QUOTES.length];
        }

        function getCountdownData() {
            const now = new Date();
            const diff = EXAM_DATE - now;
            if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, active: false };
            
            return {
                days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((diff % (1000 * 60)) / 1000),
                active: true
            };
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');

        function initEventListeners() {
            // Swipe Listeners (Only Once)
            let touchStartX = 0;
            app.addEventListener('touchstart', e => { 
                touchStartX = e.changedTouches[0].screenX; 
            }, {passive: true});
            
            app.addEventListener('touchend', e => {
                if (currentScreen !== 'quiz') return;
                const touchEndX = e.changedTouches[0].screenX;
                if (touchEndX < touchStartX - 100) nextQ();
                if (touchEndX > touchStartX + 100) prevQ();
            });

            // Keyboard Listeners
            document.addEventListener('keydown', (e) => {
                if (currentScreen !== 'quiz') return;
                if (e.key >= '1' && e.key <= '5') selectAnswer(parseInt(e.key) - 1);
                if (e.key === 'ArrowRight') nextQ();
                if (e.key === 'ArrowLeft') prevQ();
                if (e.key.toLowerCase() === 'm') toggleBookmark();
                if (e.key === 'Escape') { closeImageModal(); closeReportModal(); }
            });
        }

        function renderStartScreen() {
            currentScreen = 'start';
            isReviewMode = false;
            if(timerInterval) clearInterval(timerInterval);
            
            history.pushState({ screen: 'start' }, null, window.location.pathname);
            
            setTimeout(() => { 
                lucide.createIcons();
                updateSourceList(); 
                
                // Animasyonlu Havalı Soru Sayacı
                const qCountEl = document.getElementById('totalQCount');
                if(qCountEl) {
                    const startCount = 800;
                    const targetCount = 970;
                    const duration = 1500; // 1.5 saniye
                    const startTime = performance.now();
                    
                    function updateCounter(currentTime) {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        // Ease-out efekti (yavaşlayarak biter)
                        const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                        const currentVal = Math.floor(startCount + (targetCount - startCount) * easeOut);
                        
                        qCountEl.innerText = currentVal + "+ Soru";
                        
                        if (progress < 1) requestAnimationFrame(updateCounter);
                    }
                    requestAnimationFrame(updateCounter);
                }
            }, 0);

            const totalQ = window.SoruHavuzu.length;
            const historyData = JSON.parse(localStorage.getItem('examHistory')) || [];
            const favCount = favoriteIDs.size;

        // --- YENİ FONKSİYON: Akıllı Kaynak Listesi ---
        function updateSourceList() {
            activeProfile = document.getElementById('profileSelect').value;
            const profile = activeProfile;
            const select = document.getElementById('sourceSelect');
            
            const isISG = ['isg_a', 'isg_b', 'isg_c'].includes(profile);

            const filteredSources = SOURCES_MANIFEST.filter(m => {
                if (m.profile === 'ortak' || m.profile === 'igu') return true;
                if (m.profile === profile) return true;
                if (isISG && m.profile === 'igu') return true;
                return false;
            }).map(m => m.id).sort().reverse();

            let html = `
                <option value="KARMA_DENEME" class="font-bold text-indigo-600">🎲 Karma Deneme (50 Soru)</option>
                <option value="KARMA_CIKMIS" class="font-bold text-rose-600">📅 Karma Çıkmış Sorular (50 Soru)</option>
                <option disabled class="text-slate-300">──────────────</option>
            `;

            filteredSources.forEach(s => {
                html += `<option value="${s}">${s}</option>`;
            });

            if (filteredSources.length === 0) {
                html += `<option disabled>Bu profile uygun kaynak yok</option>`;
            }

            select.innerHTML = html;
        }

        function clearHistory() {
            if(confirm("Sınav geçmişini silmek istiyor musun?")) {
                localStorage.removeItem('examHistory');
                renderStartScreen();
            }
        }

        async function startCustomQuiz() {
            activeProfile = document.getElementById('profileSelect').value;
            const source = document.getElementById('sourceSelect').value;
            const category = document.getElementById('categorySelect').value;
            const eduRequested = document.getElementById('eduToggle').checked;
            
            app.innerHTML = `
                <div class="flex items-center justify-center h-full"> ... </div>
            `;
            setTimeout(() => safeLucide(), 0);

            try {
                if (source === 'KARMA_DENEME' || source === 'KARMA_CIKMIS') {
                    // Tüm ilgili dosyaları yükle
                    const filesToLoad = SOURCES_MANIFEST.filter(m => {
                        const isISG = ['isg_a', 'isg_b', 'isg_c'].includes(activeProfile);
                        const matchProfile = m.profile === activeProfile || (isISG && m.profile === 'igu') || m.profile === 'ortak';
                        const matchType = source === 'KARMA_DENEME' ? m.id.includes('Deneme') : !m.id.includes('Deneme');
                        return matchProfile && matchType;
                    });
                    await Promise.all(filesToLoad.map(m => loadQuestionFile(m.file)));
                } else {
                    const manifest = SOURCES_MANIFEST.find(m => m.id === source);
                    if (manifest) await loadQuestionFile(manifest.file);
                }
            } catch (err) {
                alert("Dosya yükleme hatası: " + err.message);
                renderStartScreen();
                return;
            }

            isEduMode = eduRequested;
            isTimerActive = !isEduMode;
            timeRemaining = 75 * 60;
            userAnswers = {};
            currentIndex = 0;
            
            console.log("Sınav Hazırlığı Başlıyor (Havuz Boyutu: " + window.SoruHavuzu.length + ")");
            prepareQuizQuestions(source, activeProfile, category, 50);
        }

        function startFavoritesQuiz() {
            if(favoriteIDs.size === 0) { alert("Henüz favori sorunuz yok. Sınav esnasında bayrak ikonuna tıklayarak ekleyebilirsiniz."); return; }
            currentQuestions = window.SoruHavuzu.filter(q => favoriteIDs.has(q.text));
            if(currentQuestions.length === 0) { alert("Favori sorular yüklenemedi."); return; }
            currentQuestions.sort(() => Math.random() - 0.5);
            isEduMode = true; 
            isTimerActive = false;
            activeProfile = 'favoriler'; 
            userAnswers = {};
            currentIndex = 0;
            renderQuiz();
        }

        function prepareQuizQuestions(source, profile, category, count) {
            try {
                console.log("prepareQuizQuestions Tetiklendi. Havuz:", window.SoruHavuzu.length);
                currentQuestions = [];
                let pool = window.SoruHavuzu;
                console.log("Pool initialized, size:", pool.length);
            const isISG = ['isg_a', 'isg_b', 'isg_c'].includes(profile);
            console.log("isISG check:", isISG, "Profile:", profile);

            let filteredPool = pool.filter(q => {
                if (q.profile === 'ortak' || !q.profile) return true;
                if (q.profile === profile) return true;
                if (isISG && q.profile === 'igu') return true;
                return false;
            });
            console.log("Filtered pool size after profile filter:", filteredPool.length);

            if (source === 'KARMA_DENEME') {
                filteredPool = filteredPool.filter(q => q.source.includes('Deneme'));
            } else if (source === 'KARMA_CIKMIS') {
                filteredPool = filteredPool.filter(q => !q.source.includes('Deneme'));
            } else {
                filteredPool = filteredPool.filter(q => q.source === source);
            }

            if (category !== 'TUMU') {
                filteredPool = filteredPool.filter(q => q.category === category);
            }

            if (filteredPool.length === 0) { 
                alert("Seçilen kriterlere uygun soru bulunamadı!"); 
                renderStartScreen();
                return; 
            }

            if ((source === 'KARMA_DENEME' || source === 'KARMA_CIKMIS') && category === 'TUMU') {
                const isHekim = profile === 'hekim';
                const distribution = isHekim ? HEKIM_DISTRIBUTION : STANDARD_DISTRIBUTION;
                let collectedQuestions = [];
                for (const [cat, num] of Object.entries(distribution)) {
                    let catQuestions = filteredPool.filter(q => q.category === cat);
                    if (catQuestions.length > 0) {
                        catQuestions.sort(() => Math.random() - 0.5);
                        collectedQuestions.push(...catQuestions.slice(0, num));
                    }
                }

                if (collectedQuestions.length < 50) {
                    const remainingPool = filteredPool.filter(q => !collectedQuestions.includes(q));
                    remainingPool.sort(() => Math.random() - 0.5);
                    collectedQuestions.push(...remainingPool.slice(0, 50 - collectedQuestions.length));
                }

                while (collectedQuestions.length < 50 && collectedQuestions.length > 0) {
                    collectedQuestions.push(collectedQuestions[Math.floor(Math.random() * collectedQuestions.length)]);
                }
                currentQuestions = collectedQuestions;
            } else {
                currentQuestions = filteredPool;
            }

            currentQuestions.sort(() => Math.random() - 0.5);

            if (category !== 'TUMU' && currentQuestions.length > 50) {
                currentQuestions = currentQuestions.slice(0, 50);
            }

            userAnswers = {};
            currentIndex = 0;
            console.log("Ready to start quiz. Questions count:", currentQuestions.length);
            if (isTimerActive) startTimer();
            
            history.pushState({ screen: 'quiz' }, null, window.location.pathname);
            console.log("Calling renderQuiz...");
            renderQuiz();
            } catch (err) {
                console.error("prepareQuizQuestions HATASI:", err);
                alert("Sınav başlatılırken bir hata oluştu: " + err.message);
                renderStartScreen();
            }
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                const el = document.getElementById('timerDisplay');
                if(el) {
                    const m = Math.floor(timeRemaining / 60).toString().padStart(2,'0');
                    const s = (timeRemaining % 60).toString().padStart(2,'0');
                    el.innerText = `${m}:${s}`;
                    if(timeRemaining < 300) el.classList.add('text-red-500', 'animate-pulse');
                }
                if (timeRemaining <= 0) finishQuiz();
            }, 1000);
        }

        function changeFont(delta) {
            fontLevel += delta;
            if (fontLevel < 0) fontLevel = 0;
            if (fontLevel > 3) fontLevel = 3;
            renderQuiz(); 
        }

        // --- SINAV EKRANI ---
        function renderQuiz() {
            try {
                console.log("renderQuiz Tetiklendi, Index:", currentIndex);
                currentScreen = 'quiz';
                
                if (!currentQuestions[currentIndex]) {
                    console.error("Soru bulunamadı!");
                    finishQuiz();
                    return;
                }

            if (typeof lucide !== 'undefined') setTimeout(() => lucide.createIcons(), 0);
            
            const q = currentQuestions[currentIndex];
            const isAnswered = userAnswers[currentIndex] !== undefined;
            const myAnswer = userAnswers[currentIndex];
            const isBookmarked = favoriteIDs.has(q.text);

            // GÜNCELLEME: RESİM YER TUTUCUSU EKLENDİ (LAYOUT SHIFT ÖNLENDİ)
            let imageHtml = q.image ? `
                <div class="mb-4 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 flex justify-center group relative cursor-zoom-in img-placeholder" onclick="openImageModal('${q.image}')">
                    <img src="${q.image}" class="max-h-56 object-contain" onerror="this.style.display='none'">
                    <div class="absolute bottom-2 right-2 bg-black/50 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1">
                        <i data-lucide="maximize-2" class="w-3 h-3"></i> Büyüt
                    </div>
                </div>` : '';

            let optionsHtml = q.options.map((opt, i) => {
                const letters = ["A", "B", "C", "D", "E"];
                let btnClass = "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-750 text-slate-700 dark:text-slate-300";
                let iconClass = "bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400";

                if (isAnswered || isReviewMode) {
                    if (!isEduMode && !isReviewMode) { 
                        if (i === myAnswer) { 
                            btnClass = "bg-primary-50 dark:bg-primary-900/20 border-primary-500 ring-1 ring-primary-500 text-primary-900 dark:text-white";
                            iconClass = "bg-primary-600 text-white";
                        }
                    } else { 
                        if (i === q.correct) {
                            btnClass = "bg-green-50 dark:bg-green-900/20 border-green-500 ring-1 ring-green-500 text-green-900 dark:text-white";
                            iconClass = "bg-green-600 text-white";
                        } else if (i === myAnswer) {
                            btnClass = "bg-red-50 dark:bg-red-900/20 border-red-500 ring-1 ring-red-500 text-red-900 dark:text-white";
                            iconClass = "bg-red-600 text-white";
                        }
                    }
                }

                let clickAction = (isEduMode && isAnswered) || isReviewMode ? '' : `onclick="selectAnswer(${i})"`;
                let cursor = ((isEduMode && isAnswered) || isReviewMode) ? 'cursor-default' : 'cursor-pointer';
                let fontClass = `text-size-${fontLevel}`;

                return `
                <div ${clickAction} class="w-full p-3.5 rounded-xl border-2 mb-2.5 flex items-start gap-3 transition-all ${btnClass} ${cursor}">
                    <div class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center font-bold text-xs border ${iconClass} mt-0.5">
                        ${letters[i]}
                    </div>
                    <span class="${fontClass} font-medium leading-snug pt-1 select-none">${opt}</span>
                </div>`;
            }).join('');

            let explanationHtml = '';
            if ((isEduMode && isAnswered) || isReviewMode) {
                explanationHtml = `
                    <div class="mt-4 p-4 bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 rounded-r-xl fade-in">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2 text-blue-700 dark:text-blue-400 font-bold text-xs uppercase tracking-wider">
                                <i data-lucide="info" class="w-3 h-3"></i> Açıklama
                            </div>
                            <button onclick="askAI()" class="flex items-center gap-1.5 px-2 py-1 bg-white dark:bg-slate-800 border border-blue-200 dark:border-blue-700 rounded-md text-[10px] font-bold text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors shadow-sm">
                                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> AI ile Detaylandır

        // --- 8. SONUÇ EKRANI ---
        function finishQuiz() {
            currentScreen = 'result';
            if(timerInterval) clearInterval(timerInterval);
            
            // ANALYTICS: Sınav Bitişi
            if (typeof gtag === 'function') {
                gtag('event', 'quiz_completed', {
                    'event_category': 'Engagement',
                    'event_label': activeProfile
                });
            }

            let correct = 0, wrong = 0, empty = 0;
            let topicStats = {};

            currentQuestions.forEach((q, i) => {
                if (!topicStats[q.category]) topicStats[q.category] = { total: 0, correct: 0 };
                topicStats[q.category].total++;

                if (userAnswers[i] === undefined) empty++;
                else if (userAnswers[i] === q.correct) {
                    correct++;
                    topicStats[q.category].correct++;
                }
                else wrong++;
            });

            const score = currentQuestions.length > 0 ? ((correct / currentQuestions.length) * 100).toFixed(1) : 0;
            const profileVal = activeProfile; 
            const profileInfo = CONFIG[profileVal] || CONFIG['igu'];

            if(!isReviewMode && activeProfile !== 'favoriler') {
                const historyData = JSON.parse(localStorage.getItem('examHistory')) || [];
                historyData.unshift({
                    date: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit'}),
                    score: score,
                    correct: correct,
                    wrong: wrong,
                    mode: isTimerActive ? 'Sınav' : 'Eğitim',
                    profileLabel: profileInfo.label,
                    profileColor: profileInfo.color
                });
                if(historyData.length > 10) historyData.pop();
                localStorage.setItem('examHistory', JSON.stringify(historyData));

                // TOPLAM DOĞRUYU GÜNCELLE
                totalCorrectAllTime += correct;
                localStorage.setItem('isg_total_correct', totalCorrectAllTime.toString());
            }

            let analysisHtml = '';
            for (const [cat, data] of Object.entries(topicStats)) {
                const percent = Math.round((data.correct / data.total) * 100);
                let barColor = percent >= 70 ? 'bg-green-500' : (percent >= 40 ? 'bg-yellow-500' : 'bg-red-500');
                
                analysisHtml += `
                    <div class="mb-3">
                        <div class="flex justify-between text-xs mb-1">
                            <span class="font-bold text-slate-700 dark:text-slate-300">${cat}</span>
                            <span class="font-mono text-slate-500">${data.correct}/${data.total} (%${percent})</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2">
                            <div class="${barColor} h-2 rounded-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;

            app.innerHTML = `

                                <circle cx="64" cy="64" r="56" stroke="currentColor" stroke-width="8" fill="transparent" class="${score >= 70 ? 'text-green-500' : 'text-red-500'} transition-all duration-1000" style="stroke-dasharray: 351.86; stroke-dashoffset: ${351.86 - (351.86 * score / 100)};" />
                            </svg>
                            <div class="absolute inset-0 flex items-center justify-center flex-col">
                                <span class="text-3xl font-black text-slate-800 dark:text-white">${score}</span>
                                <span class="text-[10px] uppercase font-bold text-slate-400">Puan</span>

                        </div>
                        
                        <div class="flex gap-4 w-full justify-center">

                                <div class="text-[10px] text-slate-400 uppercase">Doğru</div>
                            </div>

                            </div>
                        </div>

                    <div class="p-6 space-y-4">

            setTimeout(() => {

        function renderResultChart(stats) {
            const canvas = document.getElementById('resultChart');
            if(!canvas) return;

            if (typeof Chart === 'undefined') {
                canvas.parentElement.innerHTML = '<div class="flex items-center justify-center h-full text-slate-400 text-xs italic p-10 text-center">Grafik kütüphanesi yüklenemediğinden başarı grafiği gösterilemiyor.</div>';
                return;
            }

            const ctx = canvas.getContext('2d');
            const labels = Object.keys(stats);
            const data = labels.map(l => Math.round((stats[l].correct / stats[l].total) * 100));
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Başarı %',
                        data: data,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: 'rgb(59, 130, 246)',
                        pointBackgroundColor: 'rgb(59, 130, 246)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(59, 130, 246)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { display: true },
                            suggestedMin: 0,
                            suggestedMax: 100,
                            ticks: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsBox = document.getElementById('searchResults');
            
            if (query.length < 2) {
                resultsBox.innerHTML = `<div class="text-center py-20 text-slate-400"><p class="text-sm">En az 2 karakter girin...</p></div>`;
                return;
            }

            const matches = window.SoruHavuzu.filter(q => 
                q.text.toLowerCase().includes(query) || 
                q.category.toLowerCase().includes(query) ||
                q.source.toLowerCase().includes(query)
            ).slice(0, 50);

            if (matches.length === 0) {
                resultsBox.innerHTML = `<div class="text-center py-20 text-slate-400"><p class="text-sm">Sonuç bulunamadı.</p></div>`;
                return;
            }

            resultsBox.innerHTML = matches.map((m, idx) => {
                const letters = ["A", "B", "C", "D", "E"];
                const optionsHtml = m.options.map((opt, i) => {
                    const isCorrect = i === m.correct;
                    return `

                                    <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">Bu soru genellikle <b>${q.category}</b> başlığı altında karşımıza çıkar. ${q.category === 'Mevzuat' ? 'Yönetmelik maddelerindeki sayısal verilere (gün, ay, yıl) dikkat etmelisin.' : 'Teknik terimlerin tanımlarını iyi bilmek bu tür soruları çözmeni kolaylaştırır.'}</p>
                                </div>
                            </div>
                        </div>

                        <div class="p-4 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-xl shadow-blue-100 dark:shadow-none">
                            <div class="flex items-center gap-2 mb-2 font-bold text-xs uppercase"><i data-lucide="book-open" class="w-3 h-3"></i> İlgili Mevzuat / Bilgi</div>
                            <p class="text-xs leading-relaxed opacity-90">Bu konuyla ilgili daha fazla bilgi için <b>İSG Temel Mevzuat</b> dökümanlarını inceleyebilirsiniz.</p>
                        </div>
                    </div>

                    <div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900">
                        <button onclick="document.getElementById('aiModal').remove()" class="w-full py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl font-bold text-sm text-slate-600 dark:text-slate-300 shadow-sm">Anladım, Teşekkürler</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => lucide.createIcons(), 0);
        }

        // --- TEMA SiSTEMi ---
        const THEMES = {
            'sakarya': { label: '54', sec: '#000000', colors: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#16a34a',600:'#15803d',700:'#166534',800:'#14532d',900:'#052e16',950:'#022c22' } },
            'trabzon': { label: '61', sec: '#2563eb', colors: { 50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#800000',600:'#700000',700:'#600000',800:'#500000',900:'#400000',950:'#200000' } },
            'edirne': { label: '22', sec: '#ffffff', colors: { 50:'#fef2f2',100:'#fee2e2',200:'#fecaca',300:'#fca5a5',400:'#f87171',500:'#dc2626',600:'#b91c1c',700:'#991b1b',800:'#7f1d1d',900:'#450a0a',950:'#3f0808' } },
            'fb': { label: 'FB', sec: '#facc15', colors: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#1e3a8a',600:'#1e40af',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554' } },
            'gs': { label: 'GS', sec: '#facc15', colors: { 50:'#fff7ed',100:'#ffedd5',200:'#fed7aa',300:'#fdba74',400:'#fb923c',500:'#b91c1c',600:'#991b1b',700:'#7f1d1d',800:'#63021c',900:'#4d0116',950:'#36010f' } },
            'bjk': { label: 'BJK', sec: '#ffffff', colors: { 50:'#fafafa',100:'#f5f5f5',200:'#e5e5e5',300:'#d4d4d4',400:'#a3a3a3',500:'#000000',600:'#000000',700:'#000000',800:'#000000',900:'#000000',950:'#000000' } }
        };

        function openThemeModal() {
            var list = document.getElementById('themeList');
            if (!list) return;
            list.innerHTML = '';
            var keys = Object.keys(THEMES);
            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                var theme = THEMES[key];
                var isActive = localStorage.getItem('isg_theme_key') === key;
                var btn = document.createElement('button');
                btn.onclick = (function(k) { return function() { setColorTheme(k); }; })(key);
                btn.className = 'flex flex-col items-center transition-all';
                var ringClass = isActive ? 'ring-2 ring-offset-2 ring-primary-500 scale-110' : 'hover:scale-105';
                btn.innerHTML = '<div class="w-10 h-10 rounded-full shadow-md flex items-center justify-center text-white font-bold text-[11px] ' + ringClass + '" style="background:linear-gradient(135deg,' + theme.colors[500] + ',' + theme.sec + ')">' + theme.label + '</div>';
                list.appendChild(btn);
            }
            document.getElementById('themeModal').classList.remove('hidden');
            document.getElementById('themeModal').classList.add('flex');
        }

        function closeThemeModal() {
            document.getElementById('themeModal').classList.add('hidden');
            document.getElementById('themeModal').classList.remove('flex');
        }

        function setColorTheme(key) {
            var theme = THEMES[key];
            if (!theme) return;
            localStorage.setItem('isg_theme_key', key);
            var root = document.documentElement;
            var levels = Object.keys(theme.colors);
            for (var i = 0; i < levels.length; i++) {
                root.style.setProperty('--p' + levels[i], theme.colors[levels[i]]);
            }
            root.style.setProperty('--sec', theme.sec);
            closeThemeModal();
            renderCurrentScreen();
        }

        document.addEventListener('DOMContentLoaded', function() {
            var savedTheme = localStorage.getItem('isg_theme_key') || 'sakarya';
            setColorTheme(savedTheme);
            initTheme();
            initEventListeners();
            renderStartScreen();
        });
    </script>
</body>
</html>
